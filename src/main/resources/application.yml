spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/auth}
    username: ${DB_USER:auth}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  docker:
    compose:
      enabled: false   # opt-in via the "local" profile only
  thymeleaf:
    cache: true

management:
  endpoints:
    web:
      # ecosystem contract (master plan): every app answers /health and /info
      base-path: /
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: framework   # issuer/redirects behind Traefik

auth:
  # OIDC issuer — MUST match the public URL exactly; clients pin it
  issuer: ${AUTH_ISSUER:http://localhost:8080}
  token:
    access-ttl: ${ACCESS_TTL:10m}        # short-lived by design
    refresh-ttl: ${REFRESH_TTL:14d}      # rotated on every use
    reuse-refresh-tokens: false          # rotation, not reuse
  keys:
    # JWKS rotation: a fresh RSA key this often; retired keys stay published
    # until every token they signed has expired
    rotation-days: ${KEY_ROTATION_DAYS:30}
  login:
    # rate limit: attempts per window, per username+IP
    max-attempts: 10
    window: 10m
  bootstrap:
    # first-run admin seed; only applied when the users table is empty
    admin-email: ${ADMIN_EMAIL:}
    admin-password: ${ADMIN_PASSWORD:}
    admin-name: ${ADMIN_NAME:Admin}
    # optional demo account (test envs): seeded once if absent, friend group
    demo-email: ${DEMO_EMAIL:}
    demo-password: ${DEMO_PASSWORD:}
